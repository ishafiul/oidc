name: oidc_flutter_client
description: Flutter OIDC client for project-scoped OIDC (PKCE, secure storage, refresh).
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.5.0
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_appauth: ^11.0.0
  flutter_secure_storage: ^9.2.4
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: false
